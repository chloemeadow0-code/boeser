# nginx.conf
worker_processes 1;

# 核心修改：将 pid 文件移至 /tmp，确保普通用户有写入权限
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # 核心修改：将所有缓存和临时文件目录移至 /tmp，避免权限拒绝错误
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # 映射 WebSocket 升级请求头（为 noVNC 准备）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        # 监听 Zeabur 面板配置的 8080 端口，接收所有外部流量
        listen 8080;

        # 1. 核心修改：专门处理 MCP 的 SSE 连接
        location /sse {
            # 解决聊天平台的跨域拦截 (CORS)
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
            # 秒回 OPTIONS 预检请求
            if ($request_method = 'OPTIONS') { return 204; }

            proxy_pass http://127.0.0.1:8082/sse;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # 关键！告诉 Python 我们是在 HTTPS 环境下，防止它给客户端发错消息地址
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            
            # 禁用所有形式的缓存，确保 SSE 数据实时流出
            proxy_set_header X-Accel-Buffering no;
            proxy_cache off;
            proxy_buffering off;
            chunked_transfer_encoding off;
            
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # 2. 处理 MCP 的消息发送
        location /messages {
            # 同样需要解决跨域拦截 (CORS)
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
            if ($request_method = 'OPTIONS') { return 204; }

            proxy_pass http://127.0.0.1:8082/messages;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. 主服务路由
        location / {
            proxy_pass http://127.0.0.1:8082;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        # 4. VNC 路由：访问 你的域名/vnc/ 时，进入浏览器可视化界面 (6080端口)
        location /vnc/ {
            proxy_pass http://127.0.0.1:6080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }
    }
}