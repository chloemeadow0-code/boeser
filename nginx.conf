# nginx.conf
worker_processes 1;

# 核心修改：将 pid 文件移至 /tmp，确保普通用户有写入权限
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # 核心修改：将所有缓存和临时文件目录移至 /tmp，避免权限拒绝错误
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # 映射 WebSocket 升级请求头（为 noVNC 准备）
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        # 监听 Dockerfile 中暴露给外部的 7860 端口
        listen 7860;

        # 1. 核心修改：专门处理 MCP 的 SSE 连接
        location /sse {
            proxy_pass http://127.0.0.1:8081/sse;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            
            # 关键：禁用所有形式的缓存，确保 SSE 数据实时流出
            proxy_set_header X-Accel-Buffering no;
            proxy_cache off;
            proxy_buffering off;
            chunked_transfer_encoding off;
            
            # 延长超时时间，防止长连接被 Nginx 强制切断
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # 2. 处理 MCP 的消息发送
        location /messages {
            proxy_pass http://127.0.0.1:8081/messages;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 3. 主服务路由
        location / {
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # 4. VNC 路由：访问 你的域名/vnc/ 时，进入浏览器可视化界面 (6080端口)
        location /vnc/ {
            proxy_pass http://127.0.0.1:6080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
        }
    }
}